---
apiVersion: kubeadm.k8s.io/v1beta3
kind: InitConfiguration
localAPIEndpoint:
  advertiseAddress: "192.168.56.10"
  bindPort: 6443
bootstrapTokens:
  - token: "abcdef.1234567890abcdef"
    ttl: "0"                          # token süresi dolmaz, worker'lar geç join edebilir
nodeRegistration:
  criSocket: "unix:///run/containerd/containerd.sock"

---
apiVersion: kubeadm.k8s.io/v1beta3
kind: ClusterConfiguration
kubernetesVersion: "1.29.0"
controlPlaneEndpoint: "192.168.56.10:6443"
networking:
  podSubnet: "192.168.0.0/16"        # Calico için zorunlu CIDR
  serviceSubnet: "10.96.0.0/12"

---
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
cgroupDriver: systemd                 # containerd SystemdCgroup = true ile eşleşmeli