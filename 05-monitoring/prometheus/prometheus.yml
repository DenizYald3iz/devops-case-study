global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files:
  - alerts.yml

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: cadvisor
    static_configs:
      - targets: ["cadvisor:8080"]
    # cAdvisor container CPU/memory metriklerini expose eder
    # container_cpu_usage_seconds_total, container_memory_usage_bytes vb.

  - job_name: node-exporter
    static_configs:
      - targets: ["node-exporter:9100"]
    # Host seviyesi metrikler: node_cpu_seconds_total, node_memory_MemAvailable_bytes vb.

  # Streamlit'in built-in Prometheus endpoint'i yok.
  # Container CPU/memory metrikleri cAdvisor üzerinden name="streamlit-app" label'ı ile geliyor.
