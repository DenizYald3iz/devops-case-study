# docker-compose.yml
# - version: '3.9'
# - services:
#     app:
#       - build context ve Dockerfile yolu
#       - env_file: .env
#       - ports: host:container eşlemesi
#       - depends_on: db, redis vb. bağımlı servisler
#       - restart: unless-stopped
#     db:
#       - Resmi veritabanı imajı (postgres, mysql vb.)
#       - volume ile veri kalıcılığı
#       - healthcheck tanımı
# - volumes: adlandırılmış volume tanımları
# - networks: özel ağ tanımı

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: streamlit-case-app:${APP_VERSION:-1.0.0}
    container_name: streamlit-app
    restart: unless-stopped              
    env_file: .env
    ports:
      - "${STREAMLIT_SERVER_PORT:-8501}:${STREAMLIT_SERVER_PORT:-8501}"
    environment:
      - STREAMLIT_SERVER_PORT=${STREAMLIT_SERVER_PORT:-8501}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:${STREAMLIT_SERVER_PORT:-8501}/_stcore/health')"]
      interval: 30s
      timeout: 10s
      start_period: 10s
      retries: 3
    networks:
      - app-net
    # Kaynak sınırlamaları (opsiyonel) Docker Swarm icin geçerlidir  
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
networks:
  app-net:
    driver: bridge